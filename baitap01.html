<input type="text" id="searchInput" placeholder="Tìm tên sản phẩm...">
<div id="productGrid" class="grid-container"></div>
<p id="errorMsg" style="color:red; display:none;">Không tìm thấy sản phẩm nào!</p>

<script>
const products = [
    {id: 1, name: 'Tarot Deck Rider Waite', price: '500k'},
    {id: 2, name: 'Nến thơm chữa lành', price: '200k'},
    {id: 3, name: 'Đá Thạch Anh tím', price: '150k'},
    {id: 4, name: 'Sách hướng dẫn Tarot', price: '300k'},
    {id: 5, name: 'Khăn trải bài nhung', price: '120k'}
];

function displayProducts(data) {
    const container = document.getElementById('productGrid');
    const error = document.getElementById('errorMsg');
    container.innerHTML = data.map(p => `
        <div class="product-card">
            <h3>${p.name}</h3>
            <p>Giá: ${p.price}</p>
        </div>
    `).join('');
    error.style.display = data.length === 0 ? 'block' : 'none';
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase().trim();
    const filtered = products.filter(p => p.name.toLowerCase().includes(term));
    displayProducts(filtered);
});
displayProducts(products);
</script>
